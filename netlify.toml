[build]
  publish = "."

[build.processing.html]
  pretty_urls = true

# Headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

# Cache static assets longer
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Block .git access
[[headers]]
  for = "/.git/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404

# Block bad bots/subnets via edge function (temporarily disabled)
# [[edge_functions]]
#   function = "block-bots"
#   path = "/*"
#   excludedPath = ["/.netlify/*"]
# Pretty URL rewrites
[[redirects]]
  from = "/working-with-claude"
  to = "/working-with-claude.html"
  status = 200

[[redirects]]
  from = "/working-with-claude-blog"
  to = "/working-with-claude-blog.html"
  status = 200

# 301 redirect .html variants to clean URLs
[[redirects]]
  from = "/working-with-claude.html"
  to = "/working-with-claude"
  status = 301
  force = true

[[redirects]]
  from = "/working-with-claude-blog.html"
  to = "/working-with-claude-blog"
  status = 301
  force = true

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/etl-showcase"
  to = "/etl-showcase.html"
  status = 200

[[redirects]]
  from = "/consultant-expertise"
  to = "/consultant-expertise.html"
  status = 200

[[redirects]]
  from = "/favicon.ico"
